<script>
// ═══════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════
// FIX 2: Removed the broken stub functions playRasenganSound/stopRasenganSound
//         that were left as pseudo-code. The real functions are startRasengan /
//         stopRasengan / startChidori / stopChidori below — used in render().

let audioCtx = null;
const snd = { rasengan: null, chidori: null };

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function buildNoise(duration, sparsity) {
  const len = audioCtx.sampleRate * duration;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++)
    d[i] = Math.random() < sparsity ? (Math.random()*2-1) * (1/sparsity*0.015) : (Math.random()*2-1)*0.02;
  return buf;
}

function startRasengan() {
  if (!audioCtx || snd.rasengan) return;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.8);
  master.connect(audioCtx.destination);

  const noise = audioCtx.createBufferSource();
  noise.buffer = buildNoise(3, 1); noise.loop = true;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 480; bp.Q.value = 0.7;
  const lfo = audioCtx.createOscillator(); lfo.frequency.value = 5.5;
  const lg = audioCtx.createGain(); lg.gain.value = 160;
  lfo.connect(lg); lg.connect(bp.frequency); lfo.start();
  noise.connect(bp); bp.connect(master); noise.start();

  const sub = audioCtx.createOscillator(); sub.type = 'sawtooth'; sub.frequency.value = 52;
  const sg = audioCtx.createGain(); sg.gain.value = 0.14;
  sub.connect(sg); sg.connect(master); sub.start();

  const hi = audioCtx.createOscillator(); hi.type = 'sine'; hi.frequency.value = 280;
  const hg = audioCtx.createGain(); hg.gain.value = 0.09;
  hi.connect(hg); hg.connect(master); hi.start();

  snd.rasengan = { master, nodes: [noise, lfo, sub, hi] };
}

function stopRasengan() {
  if (!snd.rasengan) return;
  snd.rasengan.master.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
  const n = snd.rasengan.nodes;
  setTimeout(() => n.forEach(x => { try { x.stop(); } catch(e){} }), 600);
  snd.rasengan = null;
}

function startChidori() {
  if (!audioCtx || snd.chidori) return;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.55, audioCtx.currentTime + 0.4);
  master.connect(audioCtx.destination);

  const crk = audioCtx.createBufferSource();
  crk.buffer = buildNoise(3, 0.004); crk.loop = true;
  const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2800;
  crk.connect(hp); hp.connect(master); crk.start();

  const chirpNodes = [];
  for (let i = 0; i < 3; i++) {
    const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = 1900 + i*550;
    const lfo = audioCtx.createOscillator(); lfo.frequency.value = 14 + i*9;
    const lg = audioCtx.createGain(); lg.gain.value = 380;
    lfo.connect(lg); lg.connect(o.frequency);
    const g = audioCtx.createGain(); g.gain.value = 0.033;
    o.connect(g); g.connect(master);
    o.start(); lfo.start();
    chirpNodes.push(o, lfo);
  }

  const hum = audioCtx.createOscillator(); hum.type = 'sawtooth'; hum.frequency.value = 88;
  const hg = audioCtx.createGain(); hg.gain.value = 0.07;
  hum.connect(hg); hg.connect(master); hum.start();

  snd.chidori = { master, nodes: [crk, hum, ...chirpNodes] };
}

function stopChidori() {
  if (!snd.chidori) return;
  snd.chidori.master.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.35);
  const n = snd.chidori.nodes;
  setTimeout(() => n.forEach(x => { try { x.stop(); } catch(e){} }), 450);
  snd.chidori = null;
}

// ═══════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════
const vEl   = document.getElementById('v_src');
const sCvs  = document.getElementById('skeleton');
const sCtx  = sCvs.getContext('2d');
const nVid  = document.getElementById('n');
const sVid  = document.getElementById('s');
const label = document.getElementById('label');

let W, H;
function resize() { W = sCvs.width = window.innerWidth; H = sCvs.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════
//  HAND STATE
// ═══════════════════════════════════════════════════════
let hands = { left: null, right: null };
let pwr   = { left: 0, right: 0 };

function classifyHands(res) {
  hands = { left: null, right: null };
  if (!res.multiHandLandmarks) return;
  res.multiHandLandmarks.forEach((lm, i) => {
    const lbl = res.multiHandedness[i].label;
    if (lbl === 'Left')  hands.right = lm;
    else                  hands.left  = lm;
  });
}

function isOpen(lm) {
  if (!lm) return false;
  const w = lm[0];
  const tips = [8,12,16,20], pips = [6,10,14,18];
  let c = 0;
  for (let i = 0; i < 4; i++) {
    const tip = lm[tips[i]], pip = lm[pips[i]];
    if (Math.hypot(tip.x-w.x, tip.y-w.y) > Math.hypot(pip.x-w.x, pip.y-w.y)) c++;
  }
  return c >= 3;
}

function palmCenter(lm) {
  const ids = [0,5,9,13,17];
  let x = 0, y = 0;
  ids.forEach(i => { x += lm[i].x; y += lm[i].y; });
  return {
    x: (1 - x/ids.length) * W,
    y: (y/ids.length) * H
  };
}

// ═══════════════════════════════════════════════════════
//  SKELETON
// ═══════════════════════════════════════════════════════
const CONNS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

function drawSkeleton(lm, color) {
  const pts = lm.map(p => [p.x * W, p.y * H]);
  sCtx.save();
  sCtx.shadowColor = color; sCtx.shadowBlur = 14;
  sCtx.strokeStyle = color; sCtx.lineWidth = 2.5; sCtx.globalAlpha = 0.82;
  for (const [a,b] of CONNS) {
    sCtx.beginPath();
    sCtx.moveTo(pts[a][0], pts[a][1]);
    sCtx.lineTo(pts[b][0], pts[b][1]);
    sCtx.stroke();
  }
  for (let i = 0; i < pts.length; i++) {
    const big = [0,5,9,13,17].includes(i);
    sCtx.fillStyle = big ? '#ffffff' : color;
    sCtx.shadowBlur = big ? 22 : 9;
    sCtx.globalAlpha = 0.95;
    sCtx.beginPath();
    sCtx.arc(pts[i][0], pts[i][1], big ? 5.5 : 3, 0, Math.PI*2);
    sCtx.fill();
  }
  sCtx.restore();
}

// ═══════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════
const RAMP = 0.07;

function render() {
  sCtx.clearRect(0, 0, W, H);

  const lOpen = isOpen(hands.left);
  const rOpen = isOpen(hands.right);

  pwr.left  += lOpen ? RAMP : -RAMP * 2;
  pwr.right += rOpen ? RAMP : -RAMP * 2;
  pwr.left  = Math.max(0, Math.min(1, pwr.left));
  pwr.right = Math.max(0, Math.min(1, pwr.right));

  if (lOpen) startRasengan(); else stopRasengan();
  if (rOpen) startChidori();  else stopChidori();

  if (hands.left)  drawSkeleton(hands.left,  '#00d4ff');
  if (hands.right) drawSkeleton(hands.right, '#88aaff');

  if (pwr.left > 0.01 && hands.left) {
    const c = palmCenter(hands.left);
    nVid.style.display   = 'block';
    nVid.style.left      = c.x + 'px';
    nVid.style.top       = c.y + 'px';
    nVid.style.opacity   = pwr.left * 0.8;
    const sc = 0.5 + pwr.left * 0.5;
    nVid.style.transform = `translate(-50%,-50%) scale(${sc})`;
  } else if (pwr.left <= 0.01) {
    nVid.style.display = 'none';
  }

  if (pwr.right > 0.01 && hands.right) {
    const c = palmCenter(hands.right);
    sVid.style.display   = 'block';
    sVid.style.left      = c.x + 'px';
    sVid.style.top       = c.y + 'px';
    sVid.style.opacity   = pwr.right * 0.8;
    const sc = 0.5 + pwr.right * 0.5;
    sVid.style.transform = `translate(-50%,-50%) scale(${sc})`;
  } else if (pwr.right <= 0.01) {
    sVid.style.display = 'none';
  }

  const name = (lOpen && rOpen) ? 'DUAL JUTSU'
             : lOpen  ? 'RASENGAN'
             : rOpen  ? 'CHIDORI'
             : '';
  label.textContent = name;
  label.style.opacity     = name ? '1' : '0';
  label.style.color       = (!lOpen && rOpen) ? '#aabbff' : '#00cfff';
  label.style.textShadow  = (!lOpen && rOpen)
    ? '0 0 30px #aabbff, 0 0 60px #4466ff'
    : '0 0 30px #00cfff, 0 0 60px #0066ff';

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════
//  MEDIAPIPE INIT
// ═══════════════════════════════════════════════════════
// FIX 3: h.onResults() was broken — the old isR/fL snippet had been pasted
//         inside the callback argument, corrupting the whole call.
//         classifyHands(res) is the correct and complete callback.
document.getElementById('startBtn').addEventListener('click', async () => {
  initAudio();
  document.getElementById('overlay').style.display = 'none';

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 1280, height: 720, facingMode: 'user' }
  });
  vEl.srcObject = stream;
  await new Promise(r => vEl.onloadedmetadata = r);
  vEl.play();

  nVid.play().catch(() => {});
  sVid.play().catch(() => {});

  const h = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  h.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.65
  });
  h.onResults(res => classifyHands(res));

  const cam = new Camera(vEl, {
    onFrame: async () => await h.send({ image: vEl }),
    width: 1280, height: 720
  });
  cam.start();
  render();
});
</script>
</body>
</html>
